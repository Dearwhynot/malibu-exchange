openapi: 3.1.0
info:
  title: Malibu Exchange Merchant API
  version: 1.0.0-mvp
  summary: Merchant-scoped API for invoices, balances, rates, orders and payouts.
  description: |
    Public integration contract for Malibu Exchange merchant clients.

    Key rules:

    - authentication uses `Authorization: Bearer <token>`;
    - company scope and merchant scope are derived only from the token;
    - `RUB_USDT` invoice creation supports two company contours:
      - `orderAmount`: merchant enters `USDT`, customer pays `RUB`;
      - `paymentAmount`: merchant enters `RUB`, customer pays `RUB`.

servers:
  - url: /wp-json/malibu/v1
    description: Same-origin Merchant API base URL

security:
  - bearerAuth: []

tags:
  - name: Profile
    description: Merchant profile and company capabilities.
  - name: Balances
    description: Merchant balance summary.
  - name: Rates
    description: Merchant-facing directional rates and invoice capabilities.
  - name: Orders
    description: Merchant invoice list and invoice detail.
  - name: Payouts
    description: Merchant payout history.
  - name: Invoices
    description: Merchant invoice creation.

paths:
  /merchant/me:
    get:
      tags: [Profile]
      operationId: merchantGetProfile
      summary: Get current merchant profile and company capabilities.
      responses:
        '200':
          description: Merchant profile loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantMeResponse'
              examples:
                success:
                  value:
                    request_id: req_019f0b7c6ab1f193
                    data:
                      merchant:
                        id: 12
                        company_id: 3
                        name: WhyNot
                        status: active
                        telegram_username: whynotmerchant
                        created_at: '2026-05-10T08:44:12+00:00'
                      company:
                        id: 3
                        code: why_not
                        name: WhyNot
                        status: active
                      api_client:
                        id: 14
                        client_name: Production
                        status: active
                        token_prefix: mapi_live_77fa36ab
                        scopes:
                          - profile:read
                          - balances:read
                          - rates:read
                          - orders:read
                          - orders:write
                          - payouts:read
                      capabilities:
                        company_id: 3
                        merchant_id: 12
                        active_provider: kanyon
                        company_order_currency: USDT
                        provider_mode: orderAmount
                        requested_amount_currency: USDT
                        payment_currency_code: RUB
                        settlement_currency_code: USDT
                        enabled_directions:
                          - RUB_USDT
                          - RUB_THB
                          - USDT_THB
                    meta: {}
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/balances:
    get:
      tags: [Balances]
      operationId: merchantGetBalances
      summary: Get merchant balance summary.
      responses:
        '200':
          description: Merchant balances loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantBalancesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/rates:
    get:
      tags: [Rates]
      operationId: merchantGetRates
      summary: Get merchant-facing rates and invoice direction capabilities.
      responses:
        '200':
          description: Rates snapshot loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantRatesResponse'
              examples:
                success:
                  value:
                    request_id: req_019f0b7cc3d3ef20
                    data:
                      merchant_id: 12
                      company_id: 3
                      mode_summary:
                        company_id: 3
                        merchant_id: 12
                        active_provider: kanyon
                        company_order_currency: USDT
                        provider_mode: orderAmount
                        requested_amount_currency: USDT
                        payment_currency_code: RUB
                        settlement_currency_code: USDT
                        enabled_directions:
                          - RUB_USDT
                          - RUB_THB
                          - USDT_THB
                      directions:
                        - direction_code: RUB_USDT
                          title: USDT/RUB
                          label: RUB -> USDT
                          payment_currency_code: RUB
                          settlement_currency_code: USDT
                          requested_amount_currency: USDT
                          provider_mode: orderAmount
                          invoice_create_supported: true
                          display_rate: '94.5000'
                          checked_at: '2026-05-18T15:22:45+00:00'
                          source_code: rapira
                          is_supported: true
                          disclaimer: Informational rate. Final payment amount is fixed at invoice creation time.
                        - direction_code: RUB_THB
                          title: RUB/THB
                          label: RUB -> THB
                          payment_currency_code: null
                          settlement_currency_code: null
                          requested_amount_currency: null
                          provider_mode: null
                          invoice_create_supported: false
                          display_rate: '0.3900'
                          checked_at: '2026-05-18T15:22:12+00:00'
                          source_code: ex24
                          is_supported: true
                          disclaimer: Informational rate. Final payment amount is fixed at invoice creation time.
                    meta: {}
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/orders:
    get:
      tags: [Orders]
      operationId: merchantListOrders
      summary: List merchant invoices.
      parameters:
        - name: page
          in: query
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of items per page. Maximum 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: status
          in: query
          description: Comma-separated order status filter.
          schema:
            type: string
            example: created,pending,paid
      responses:
        '200':
          description: Order list loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/orders/{order_id}:
    get:
      tags: [Orders]
      operationId: merchantGetOrder
      summary: Get one merchant invoice by local order ID.
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Order detail loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/OrderNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/payouts:
    get:
      tags: [Payouts]
      operationId: merchantListPayouts
      summary: List merchant payouts.
      parameters:
        - name: page
          in: query
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of items per page. Maximum 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Payout list loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutsListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/payouts/{payout_id}:
    get:
      tags: [Payouts]
      operationId: merchantGetPayout
      summary: Get one merchant payout by local payout ID.
      parameters:
        - name: payout_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Payout detail loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/PayoutNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'

  /merchant/invoices:
    post:
      tags: [Invoices]
      operationId: merchantCreateInvoice
      summary: Create one merchant invoice.
      description: |
        `direction_code` stays `RUB_USDT`, but `requested_amount.currency_code` depends on the company contour:

        - `USDT` for `orderAmount` companies (`fintech_pay2day_order_currency = USDT`);
        - `RUB` for `paymentAmount` companies (`fintech_pay2day_order_currency = RUB`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
            examples:
              orderAmountUSDT:
                summary: Company contour = USDT / orderAmount
                value:
                  direction_code: RUB_USDT
                  requested_amount:
                    value: '10.00'
                    currency_code: USDT
                  external_order_id: api-100245
                  description: Invoice 100245
              paymentAmountRUB:
                summary: Company contour = RUB / paymentAmount
                value:
                  direction_code: RUB_USDT
                  requested_amount:
                    value: '5000.00'
                    currency_code: RUB
                  external_order_id: api-100246
                  description: Invoice 100246
      responses:
        '201':
          description: Invoice created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInvoiceResponse'
              examples:
                created:
                  value:
                    request_id: req_019f0b7d5313e622
                    data:
                      merchant_id: 12
                      company_id: 3
                      direction_code: RUB_USDT
                      provider_mode: orderAmount
                      idempotent_replay: false
                      invoice:
                        id: 57
                        merchant_order_id: MEX-57
                        external_order_id: api-100245
                        provider_order_id: KNY-781245
                        provider_external_id: KNY-781245
                        provider_code: kanyon
                        status: created
                        provider_status: CREATED
                        requested_amount:
                          value: '10.00000000'
                          currency_code: USDT
                        payment_amount:
                          value: '945.00'
                          currency_code: RUB
                        payout_amount:
                          value: '10.00000000'
                          currency_code: USDT
                        platform_fee_amount:
                          value: '0.00000000'
                          currency_code: USDT
                        payment_url: https://kanyon.example/pay/781245
                        payment_payload: https://kanyon.example/pay/781245
                        qrc_id: qrc_781245
                        is_active: true
                        is_paid: false
                        is_expired: false
                        expires_at: '2026-05-18T16:10:00+00:00'
                        created_at: '2026-05-18T15:40:00+00:00'
                        updated_at: '2026-05-18T15:40:00+00:00'
                        paid_at: null
                        merchant_rate: '94.5000'
                        payment_purpose: Invoice 100245
                        provider_mode: orderAmount
                        status_timeline:
                          created_at: '2026-05-18T15:40:00+00:00'
                          first_callback_at: null
                          last_callback_at: null
                          last_checked_at: null
                          next_check_at: null
                          paid_at: null
                          declined_at: null
                          cancelled_at: null
                          expired_at: null
                        provider_data:
                          provider_public_link: null
                          provider_requires_verification: false
                          status_reason: null
                          callback_url: https://malibu.exchange/fintech-payment-callback/
                    meta: {}
        '200':
          description: Idempotent replay returned an existing invoice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInvoiceResponse'
              examples:
                replay:
                  value:
                    request_id: req_019f0b7d8d5ca2b7
                    data:
                      merchant_id: 12
                      company_id: 3
                      direction_code: RUB_USDT
                      provider_mode: orderAmount
                      idempotent_replay: true
                      invoice:
                        id: 57
                        merchant_order_id: MEX-57
                        external_order_id: api-100245
                        provider_order_id: KNY-781245
                        provider_external_id: KNY-781245
                        provider_code: kanyon
                        status: created
                        provider_status: CREATED
                        requested_amount:
                          value: '10.00000000'
                          currency_code: USDT
                        payment_amount:
                          value: '945.00'
                          currency_code: RUB
                        payout_amount:
                          value: '10.00000000'
                          currency_code: USDT
                        platform_fee_amount:
                          value: '0.00000000'
                          currency_code: USDT
                        payment_url: https://kanyon.example/pay/781245
                        payment_payload: https://kanyon.example/pay/781245
                        qrc_id: qrc_781245
                        is_active: true
                        is_paid: false
                        is_expired: false
                        expires_at: '2026-05-18T16:10:00+00:00'
                        created_at: '2026-05-18T15:40:00+00:00'
                        updated_at: '2026-05-18T15:40:00+00:00'
                        paid_at: null
                        merchant_rate: '94.5000'
                        payment_purpose: Invoice 100245
                        provider_mode: orderAmount
                        status_timeline:
                          created_at: '2026-05-18T15:40:00+00:00'
                          first_callback_at: null
                          last_callback_at: null
                          last_checked_at: null
                          next_check_at: null
                          paid_at: null
                          declined_at: null
                          cancelled_at: null
                          expired_at: null
                        provider_data:
                          provider_public_link: null
                          provider_requires_verification: false
                          status_reason: null
                          callback_url: https://malibu.exchange/fintech-payment-callback/
                    meta: {}
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/RateLimitExceededError'
        '422':
          $ref: '#/components/responses/ValidationFailedError'
        '502':
          $ref: '#/components/responses/ProviderError'
        '503':
          $ref: '#/components/responses/ProviderUnavailableError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token

  responses:
    UnauthorizedError:
      description: Missing, invalid or inactive Bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e012f31f2
            error:
              code: unauthorized
              message: Invalid or inactive token.
    ForbiddenError:
      description: Scope denied or merchant/company access blocked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e1b5cfe0a
            error:
              code: forbidden
              message: Scope is not allowed for this token.
    NotFoundError:
      description: Requested record was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e3ca8f184
            error:
              code: not_found
              message: Merchant record was not found.
    OrderNotFoundError:
      description: Order ID does not belong to the current merchant/company scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e58ad7a8c
            error:
              code: not_found
              message: Order was not found.
    PayoutNotFoundError:
      description: Payout ID does not belong to the current merchant/company scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e5e1b8a75
            error:
              code: not_found
              message: Payout was not found.
    ConflictError:
      description: Idempotency key exists but request payload conflicts with the existing invoice.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e7ab731b0
            error:
              code: conflict
              message: external_order_id already exists with different invoice parameters.
    ValidationFailedError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            wrongCurrency:
              value:
                request_id: req_019f0b7e89cf51bc
                error:
                  code: validation_failed
                  message: requested_amount.currency_code must be USDT for the current company contour.
            unsupportedDirection:
              value:
                request_id: req_019f0b7e90f1df90
                error:
                  code: contour_not_supported
                  message: Invoice creation is not implemented for this direction yet.
    ProviderError:
      description: Upstream provider returned an unsuccessful payment-creation response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7e9a41db1b
            error:
              code: provider_error
              message: Invoice creation failed.
    ProviderUnavailableError:
      description: Upstream provider is temporarily unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7ea1d05910
            error:
              code: provider_unavailable
              message: Invoice creation failed.
    RateLimitExceededError:
      description: Per-client rate limit exceeded. Retry after the header-provided delay.
      headers:
        Retry-After:
          description: Seconds to wait before retrying the same token.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Limit:
          description: Current per-client request limit for this bucket.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Remaining:
          description: Remaining requests in the current window.
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            request_id: req_019f0b7ea1d05911
            error:
              code: rate_limit_exceeded
              message: Rate limit exceeded. Retry later.

  schemas:
    RequestId:
      type: string
      description: Request-scoped correlation ID.
      example: req_019f0b7c6ab1f193

    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - unauthorized
            - forbidden
            - merchant_blocked
            - merchant_pending
            - company_inactive
            - contour_disabled
            - contour_not_supported
            - validation_failed
            - provider_unavailable
            - provider_error
            - not_found
            - conflict
            - rate_limit_exceeded
            - internal_error
          example: validation_failed
        message:
          type: string
          example: requested_amount.value must be greater than zero.

    ErrorEnvelope:
      type: object
      required: [request_id, error]
      properties:
        request_id:
          $ref: '#/components/schemas/RequestId'
        error:
          $ref: '#/components/schemas/ErrorObject'

    SuccessEnvelope:
      type: object
      required: [request_id, data, meta]
      properties:
        request_id:
          $ref: '#/components/schemas/RequestId'
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    ClientScope:
      type: string
      enum:
        - profile:read
        - balances:read
        - rates:read
        - orders:read
        - orders:write
        - payouts:read
        - webhooks:read
        - webhooks:write

    DirectionCode:
      type: string
      enum:
        - RUB_THB
        - USDT_THB
        - RUB_USDT

    InvoiceDirectionCode:
      type: string
      enum:
        - RUB_USDT

    OrderStatus:
      type: string
      enum:
        - created
        - pending
        - paid
        - declined
        - cancelled
        - expired
        - error
        - untracked

    PayoutStatusCode:
      type: string
      enum:
        - paid
        - confirmed
        - cancelled

    ProviderMode:
      type: string
      enum:
        - orderAmount
        - paymentAmount

    CurrencyCode:
      type: string
      enum:
        - RUB
        - THB
        - USDT

    CompanyOrderCurrency:
      type: string
      enum:
        - RUB
        - USDT

    Money:
      type: object
      required: [value, currency_code]
      properties:
        value:
          type: string
          description: Decimal string value, never float.
          examples:
            - '1000.00'
            - '12.34567890'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'

    MerchantProfile:
      type: object
      required: [id, company_id, name, status, telegram_username, created_at]
      properties:
        id:
          type: integer
          minimum: 1
        company_id:
          type: integer
          minimum: 1
        name:
          type: string
        status:
          type: string
          enum: [active, pending, blocked, archived]
        telegram_username:
          type: string
        created_at:
          type: string
          format: date-time

    CompanySummary:
      type: object
      required: [id, code, name, status]
      properties:
        id:
          type: integer
          minimum: 1
        code:
          type: string
        name:
          type: string
        status:
          type: string
          example: active

    ApiClientSummary:
      type: object
      required: [id, client_name, status, token_prefix, scopes]
      properties:
        id:
          type: integer
          minimum: 1
        client_name:
          type: string
        status:
          type: string
          enum: [active, paused, revoked]
        token_prefix:
          type: string
          example: mapi_live_77fa36ab
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/ClientScope'

    MerchantCapabilities:
      type: object
      required:
        - company_id
        - merchant_id
        - active_provider
        - company_order_currency
        - enabled_directions
      properties:
        company_id:
          type: integer
          minimum: 1
        merchant_id:
          type: integer
          minimum: 1
        active_provider:
          type: string
          example: kanyon
        company_order_currency:
          $ref: '#/components/schemas/CompanyOrderCurrency'
        provider_mode:
          allOf:
            - $ref: '#/components/schemas/ProviderMode'
          nullable: true
        requested_amount_currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          nullable: true
        payment_currency_code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          nullable: true
        settlement_currency_code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          nullable: true
        enabled_directions:
          type: array
          items:
            $ref: '#/components/schemas/DirectionCode'

    BalanceSnapshot:
      type: object
      required:
        - available_balance
        - payable_balance
        - bonus_balance
        - referral_balance
        - total_balance
        - updated_at
      properties:
        available_balance:
          $ref: '#/components/schemas/Money'
        payable_balance:
          $ref: '#/components/schemas/Money'
        bonus_balance:
          $ref: '#/components/schemas/Money'
        referral_balance:
          $ref: '#/components/schemas/Money'
        total_balance:
          $ref: '#/components/schemas/Money'
        updated_at:
          type: string
          format: date-time
          nullable: true

    DirectionRate:
      type: object
      required:
        - direction_code
        - title
        - label
        - invoice_create_supported
        - display_rate
        - checked_at
        - source_code
        - is_supported
        - disclaimer
      properties:
        direction_code:
          $ref: '#/components/schemas/DirectionCode'
        title:
          type: string
        label:
          type: string
        payment_currency_code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
          nullable: true
        settlement_currency_code:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
